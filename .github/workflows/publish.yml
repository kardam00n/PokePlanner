name: Publish Docker Image

on:
  release:
    types: [published] # Odpala się zawsze gdy opublikujesz nowe Release na GitHubie
  workflow_dispatch: # Pozwala na ręczne wywołanie z zakładki "Actions"

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME konwertuje na lowercase (np. kardam00n/pokemonteampicker)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Wymagane do publikacji w GitHub Packages (GHCR)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Taguje obraz wersją z release'a (np. v1.0.0) oraz jako 'latest'
            type=semver,pattern={{version}}
            type=raw,value=latest

      # Skonfiguruj QEMU, służące do emulacji innych procesorów (np. ARM na maszynie AMD w GitHubie)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Skonfiguruj Docker Buildx, zaawansowany silnik budujący, który pozwala na "multi-architecture builds"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tutaj definiujemy, że obraz ma się zbudować W OBU formatach na raz i złączyć w jeden manifest
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
